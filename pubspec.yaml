name: streaming_app
description: "Teste tecnico Streaming App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  retrofit: ^4.9.2
  get_it: ^9.2.1
  go_router: ^17.2.0
  flutter_dotenv: ^6.0.0
  cached_network_image: ^3.4.1
  json_annotation: ^4.11.0
  equatable: ^2.0.5
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1
  build_runner: ^2.13.1
  retrofit_generator: ^10.2.5
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/icon_launcher.png"
